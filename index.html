<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waveco Labs</title>
<meta name="description" content="Waveco Labs — AI, consciousness tech, and frontier commercialization.">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --amber: #FFB000;
    --amber-dim: #CC8800;
    --amber-faint: rgba(255, 176, 0, 0.06);
    --bg: #0A0A0A;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    font-family: 'Courier New', Courier, monospace;
    font-size: 14px;
    line-height: 1.7;
    color: var(--amber-dim);
    overflow-x: hidden;
  }

  ::selection { background: rgba(255, 176, 0, 0.3); color: var(--amber); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: rgba(255, 176, 0, 0.2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255, 176, 0, 0.4); }

  .scanlines {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 2; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
  }

  .glow {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; pointer-events: none;
    background: radial-gradient(ellipse at center, rgba(255,176,0,0.03) 0%, transparent 60%);
  }

  .vignette {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 3; pointer-events: none;
    box-shadow: inset 0 0 120px rgba(0,0,0,0.7);
  }

  .scanbeam {
    position: fixed; left: 0; right: 0; height: 60px; z-index: 5; pointer-events: none;
    background: linear-gradient(180deg, transparent 0%, rgba(255,176,0,0.03) 30%, rgba(255,176,0,0.06) 50%, rgba(255,176,0,0.03) 70%, transparent 100%);
    animation: scanbeam 8s ease-in-out infinite;
  }

  .container {
    position: relative; z-index: 4;
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 24px 64px;
  }

  .prompt { color: var(--amber); margin-top: 4px; }
  .user { color: var(--amber-dim); }
  .tilde { color: var(--amber); }
  .dollar { color: var(--amber-dim); }

  .header { color: var(--amber); font-size: 20px; letter-spacing: 6px; font-weight: bold; }
  .text { color: var(--amber-dim); }
  .blank { height: 10px; }

  .dir-entry { display: flex; gap: 16px; flex-wrap: wrap; }
  .dir-name { color: var(--amber); min-width: 280px; }
  .dir-desc { color: var(--amber-dim); font-size: 13px; opacity: 0.7; }

  .product-name { color: var(--amber); font-size: 18px; letter-spacing: 4px; font-weight: bold; }
  .product-sub { color: var(--amber-dim); font-size: 13px; letter-spacing: 1px; }

  .status-badge {
    display: inline-block; border: 1px solid var(--amber-dim);
    padding: 4px 12px; color: var(--amber); font-size: 13px; letter-spacing: 1px;
  }

  .divider { color: var(--amber-dim); opacity: 0.3; letter-spacing: 2px; }

  a { color: var(--amber); text-decoration: none; border-bottom: 1px solid var(--amber-faint); transition: border-color 0.2s; }
  a:hover { border-bottom-color: var(--amber); }

  .cursor-block {
    display: inline-block; width: 8px; height: 16px;
    background: var(--amber); vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  @keyframes scanbeam { 0% { top: -60px; } 50% { top: 100vh; } 100% { top: -60px; } }

  @media (max-width: 480px) {
    body { font-size: 13px; }
    .container { padding: 32px 16px 48px; }
    .header { font-size: 16px; letter-spacing: 4px; }
    .dir-name { min-width: auto; }
  }
</style>
</head>
<body>

<div class="scanlines"></div>
<div class="glow"></div>
<div class="vignette"></div>
<div class="scanbeam"></div>

<div class="container" id="terminal"></div>

<script>
// LINE TYPES:
// { text, pause }             — instant print, then wait
// { blank, pause }            — empty line, then wait
// { divider, pause }          — divider line
// { prompt, cmd, speed, pause } — show blinking cursor, pause, then type command char by char
// { html, cls, pause }        — instant print with class and innerHTML

var PROMPT_PREFIX = '<span class="user">visitor@waveco</span><span class="user">:</span><span class="tilde">~</span><span class="dollar">$ </span>';

var LINES = [
  // Boot
  { text: 'WAVECO LABS SYSTEMS v1.0.26', pause: 80 },
  { text: 'Copyright (c) 2026 Waveco Labs, LLC. All rights reserved.', pause: 60 },
  { blank: true, pause: 120 },
  { text: 'Running diagnostics...', pause: 300 },
  { text: 'Memory check .......... OK', pause: 180 },
  { text: 'Neural link ........... OK', pause: 180 },
  { text: 'Quantum bridge ........ OK', pause: 180 },
  { text: 'Consciousness array ... OK', pause: 180 },
  { blank: true, pause: 100 },
  { text: 'All systems nominal.', pause: 200 },
  { divider: '=', pause: 300 },
  { blank: true, pause: 100 },

  // About
  { prompt: true, cmd: 'cat /about.txt', speed: 30, waitBefore: 1200, pause: 200 },
  { blank: true, pause: 100 },
  { html: 'WAVECO LABS', cls: 'header', pause: 60 },
  { text: 'We build at the edge of what\'s understood. Waveco Labs exists to', pause: 20 },
  { text: 'take frontier technology \u2014 artificial and biological intelligence,', pause: 20 },
  { text: 'consciousness research, quantum biology systems \u2014 and turn it', pause: 20 },
  { text: 'into products people can actually use. Not demos. Not whitepapers.', pause: 20 },
  { text: 'Working software that ships.', pause: 100 },
  { blank: true, pause: 80 },
  { divider: '-', pause: 200 },
  { blank: true, pause: 100 },

  // Focus areas
  { prompt: true, cmd: 'ls /focus-areas/', speed: 30, waitBefore: 1000, pause: 200 },
  { blank: true, pause: 100 },
  { html: '<span class="dir-name">  artificial-intelligence/</span><span class="dir-desc">Autonomous systems, LLM deployment, agentic workflows</span>', cls: 'dir-entry', pause: 120 },
  { html: '<span class="dir-name">  consciousness-tech/</span><span class="dir-desc">Bioelectric sensing, neurofeedback, inner-state mapping</span>', cls: 'dir-entry', pause: 120 },
  { html: '<span class="dir-name">  frontier-commercialization/</span><span class="dir-desc">Bridging breakthrough research and market-ready products</span>', cls: 'dir-entry', pause: 120 },
  { blank: true, pause: 80 },
  { divider: '-', pause: 200 },
  { blank: true, pause: 100 },

  // Product
  { prompt: true, cmd: 'cat /products/lune.txt', speed: 30, waitBefore: 1200, pause: 200 },
  { blank: true, pause: 100 },
  { html: 'LUNE', cls: 'product-name', pause: 60 },
  { blank: true, pause: 80 },
  { text: 'Cycle tracking through the lens of the cosmos.', pause: 40 },
  { text: 'Built on chronobiology. Designed as art. The menstrual cycle,', pause: 20 },
  { text: 'the lunar cycle, and the science that connects them.', pause: 40 },
  { text: 'A living interface that transforms with biology. Beautiful', pause: 20 },
  { text: 'enough to open just to look at.', pause: 40 },
  { text: 'Local-first privacy. No accounts, no cloud, no data collection.', pause: 100 },
  { blank: true, pause: 80 },
  { html: '<span class="status-badge">STATUS: Coming soon to the App Store</span>', pause: 200 },
  { blank: true, pause: 80 },
  { divider: '-', pause: 200 },
  { blank: true, pause: 100 },

  // Contact
  { prompt: true, cmd: 'cat /contact.txt', speed: 30, waitBefore: 800, pause: 200 },
  { blank: true, pause: 100 },
  { html: '<a href="mailto:info@wavecolabs.com">Email: info@wavecolabs.com</a>', pause: 60 },
  { html: '<a href="https://wavecolabs.com">Web:   wavecolabs.com</a>', pause: 100 },
  { blank: true, pause: 80 },
  { divider: '-', pause: 200 },
  { blank: true, pause: 100 },

  // Final cursor
  { finalCursor: true },
];

var terminal = document.getElementById('terminal');
var lineIdx = 0;

function scrollDown() {
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function createDiv(cls) {
  var div = document.createElement('div');
  if (cls) div.className = cls;
  terminal.appendChild(div);
  return div;
}

function typeCommand(el, prefix, cmd, speed, callback) {
  el.innerHTML = prefix;
  var cmdSpan = document.createElement('span');
  el.appendChild(cmdSpan);
  var i = 0;
  var iv = setInterval(function() {
    i++;
    cmdSpan.textContent = cmd.slice(0, i);
    scrollDown();
    if (i >= cmd.length) {
      clearInterval(iv);
      callback();
    }
  }, speed);
}

function processLine() {
  if (lineIdx >= LINES.length) return;
  var line = LINES[lineIdx];
  lineIdx++;

  // Final blinking cursor
  if (line.finalCursor) {
    var div = createDiv('prompt');
    div.innerHTML = PROMPT_PREFIX + '<span class="cursor-block"></span>';
    scrollDown();
    return;
  }

  // Blank
  if (line.blank) {
    createDiv('blank');
    scrollDown();
    setTimeout(processLine, line.pause || 50);
    return;
  }

  // Divider
  if (line.divider) {
    var ch = line.divider === '=' ? '=' : '-';
    var div = createDiv('divider');
    div.textContent = new Array(64).join(ch);
    scrollDown();
    setTimeout(processLine, line.pause || 50);
    return;
  }

  // Prompt with typed command
  if (line.prompt) {
    // First show blinking cursor and wait
    var waitDiv = createDiv('prompt');
    waitDiv.innerHTML = PROMPT_PREFIX + '<span class="cursor-block"></span>';
    scrollDown();

    setTimeout(function() {
      // Remove the waiting cursor line
      terminal.removeChild(waitDiv);

      // Create the real prompt line and type the command
      var cmdDiv = createDiv('prompt');
      typeCommand(cmdDiv, PROMPT_PREFIX, line.cmd, line.speed || 30, function() {
        setTimeout(processLine, line.pause || 100);
      });
    }, line.waitBefore || 800);
    return;
  }

  // HTML content (instant)
  if (line.html !== undefined) {
    var div = createDiv(line.cls || '');
    div.innerHTML = line.html;
    scrollDown();
    setTimeout(processLine, line.pause || 50);
    return;
  }

  // Plain text (instant)
  if (line.text !== undefined) {
    var div = createDiv('text');
    div.textContent = line.text;
    scrollDown();
    setTimeout(processLine, line.pause || 50);
    return;
  }

  // Fallback
  setTimeout(processLine, 50);
}

// Start
processLine();
</script>

</body>
</html>
